openapi: 3.1.0
info:
  title: GCCS API
  version: 0.1.0
  summary: Government Contractor Compliance SaaS API
  description: >
    API specification for the GCCS MVP. GCCS is a No-CUI compliance management
    SaaS for small U.S. government contractors. The API is tenant-scoped and
    supports company profiles, contract intake, clause obligations, evidence,
    calendar tasks, CMMC readiness, subcontractor flow-downs, reports, and
    source-backed compliance content.
  contact:
    name: GCCS Product Team
servers:
  - url: http://localhost:5062
    description: Local ASP.NET Core API
  - url: https://api.gccs.example.com
    description: Production API placeholder
security:
  - bearerAuth: []
tags:
  - name: System
    description: Health and API metadata.
  - name: Compliance Overview
    description: Product overview and dashboard summary.
  - name: Company Profile
    description: Tenant company registration, size, certification, and data posture.
  - name: Contracts
    description: Contract, solicitation, subcontract, and purchase order intake.
  - name: Clauses
    description: Contract clause capture and normalization.
  - name: Obligations
    description: Source-backed compliance obligations and contract obligation matrices.
  - name: Tasks
    description: Compliance calendar, reminders, and work assignment.
  - name: Evidence
    description: No-CUI evidence vault metadata, upload intents, versions, and reviews.
  - name: CMMC
    description: CMMC and NIST readiness assessments, controls, POA&M, and SPRS scoring.
  - name: Subcontractors
    description: Subcontractor profiles, flow-down clauses, and evidence requests.
  - name: Reports
    description: Report generation and exports.
  - name: Audit Logs
    description: Tenant audit trail.
  - name: Source Library
    description: Reviewed compliance sources and obligation library governance.
paths:
  /health:
    get:
      tags:
        - System
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/compliance/overview:
    get:
      tags:
        - Compliance Overview
      summary: Get compliance workspace overview
      operationId: getComplianceOverview
      responses:
        "200":
          description: Dashboard overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/company-profile:
    get:
      tags:
        - Company Profile
      summary: Get the tenant company profile
      operationId: getCompanyProfile
      responses:
        "200":
          description: Company profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Company Profile
      summary: Create or replace the tenant company profile
      operationId: upsertCompanyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyProfileUpsertRequest"
      responses:
        "200":
          description: Saved company profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/company-profile/sam-lookup:
    post:
      tags:
        - Company Profile
      summary: Queue a SAM.gov profile lookup
      operationId: createSamLookup
      description: >
        Creates a lookup job against an official entity data source. The MVP
        stores the request and result metadata; API keys and adapter behavior are
        implementation details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SamLookupRequest"
      responses:
        "202":
          description: Lookup accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/contracts:
    get:
      tags:
        - Contracts
      summary: List contracts
      operationId: listContracts
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ContractStatus"
        - name: agency
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/ContractorRole"
      responses:
        "200":
          description: Paged contracts.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ContractSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Contracts
      summary: Create a contract intake record
      operationId: createContract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractCreateRequest"
      responses:
        "201":
          description: Contract created.
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/contracts/{contractId}:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    get:
      tags:
        - Contracts
      summary: Get a contract
      operationId: getContract
      responses:
        "200":
          description: Contract detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Contracts
      summary: Update contract metadata
      operationId: updateContract
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/ContractPatchRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/ContractPatchRequest"
      responses:
        "200":
          description: Updated contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Contracts
      summary: Archive a contract
      operationId: archiveContract
      responses:
        "204":
          description: Contract archived.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/documents:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    get:
      tags:
        - Contracts
      summary: List contract intake documents
      operationId: listContractDocuments
      responses:
        "200":
          description: Contract documents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Contracts
      summary: Create a No-CUI contract document upload intent
      operationId: createContractDocumentUploadIntent
      description: >
        Returns an upload intent for a contract file. Users must attest that the
        file does not contain CUI, classified information, export-controlled
        technical data, or other content excluded by the MVP No-CUI posture.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUploadIntentRequest"
      responses:
        "201":
          description: Upload intent created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadIntent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/documents/{documentId}/extraction-jobs:
    parameters:
      - $ref: "#/components/parameters/ContractId"
      - $ref: "#/components/parameters/DocumentId"
    post:
      tags:
        - Contracts
      summary: Queue contract document extraction
      operationId: createContractExtractionJob
      responses:
        "202":
          description: Extraction job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/clauses:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    get:
      tags:
        - Clauses
      summary: List clauses captured for a contract
      operationId: listContractClauses
      responses:
        "200":
          description: Clauses.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractClause"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Clauses
      summary: Add a clause to a contract
      operationId: addContractClause
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractClauseCreateRequest"
      responses:
        "201":
          description: Clause added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractClause"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/obligations:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    get:
      tags:
        - Obligations
      summary: List obligation matrix for a contract
      operationId: listContractObligations
      responses:
        "200":
          description: Contract obligation matrix.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractObligation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/obligation-evaluations:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    post:
      tags:
        - Obligations
      summary: Evaluate contract clauses against the obligation library
      operationId: evaluateContractObligations
      description: >
        Produces or refreshes draft contract-specific obligations. Results must
        retain source references and expert-review flags from the obligation
        library.
      responses:
        "202":
          description: Evaluation job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/obligations:
    get:
      tags:
        - Obligations
      summary: List source-backed obligation library records
      operationId: listObligations
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: q
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
            examples:
              - FAR 52.204-21
        - name: riskLevel
          in: query
          schema:
            $ref: "#/components/schemas/RiskLevel"
        - name: dataType
          in: query
          schema:
            $ref: "#/components/schemas/DataType"
      responses:
        "200":
          description: Paged obligations.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Obligation"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/obligations/{obligationId}:
    parameters:
      - $ref: "#/components/parameters/ObligationId"
    get:
      tags:
        - Obligations
      summary: Get an obligation library record
      operationId: getObligationById
      responses:
        "200":
          description: Obligation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Obligation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks:
    get:
      tags:
        - Tasks
      summary: List compliance tasks
      operationId: listTasks
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: ownerUserId
          in: query
          schema:
            type: string
            format: uuid
        - name: dueFrom
          in: query
          schema:
            type: string
            format: date
        - name: dueTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paged tasks.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ComplianceTask"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Tasks
      summary: Create a compliance task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceTaskCreateRequest"
      responses:
        "201":
          description: Task created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceTask"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/tasks/{taskId}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    patch:
      tags:
        - Tasks
      summary: Update a compliance task
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/ComplianceTaskPatchRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceTaskPatchRequest"
      responses:
        "200":
          description: Updated task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceTask"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/calendar/events:
    get:
      tags:
        - Tasks
      summary: List calendar events
      operationId: listCalendarEvents
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Calendar events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/evidence-items:
    get:
      tags:
        - Evidence
      summary: List evidence items
      operationId: listEvidenceItems
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: tag
          in: query
          schema:
            type: string
        - name: obligationId
          in: query
          schema:
            type: string
        - name: contractId
          in: query
          schema:
            type: string
            format: uuid
        - name: controlId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/EvidenceStatus"
      responses:
        "200":
          description: Paged evidence items.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/EvidenceItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Evidence
      summary: Create evidence metadata
      operationId: createEvidenceItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceItemCreateRequest"
      responses:
        "201":
          description: Evidence item created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/evidence-items/{evidenceItemId}:
    parameters:
      - $ref: "#/components/parameters/EvidenceItemId"
    get:
      tags:
        - Evidence
      summary: Get an evidence item
      operationId: getEvidenceItem
      responses:
        "200":
          description: Evidence item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Evidence
      summary: Update evidence metadata
      operationId: updateEvidenceItem
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/EvidenceItemPatchRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceItemPatchRequest"
      responses:
        "200":
          description: Updated evidence item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Evidence
      summary: Archive an evidence item
      operationId: archiveEvidenceItem
      responses:
        "204":
          description: Evidence item archived.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/evidence-items/{evidenceItemId}/upload-intents:
    parameters:
      - $ref: "#/components/parameters/EvidenceItemId"
    post:
      tags:
        - Evidence
      summary: Create a No-CUI evidence file upload intent
      operationId: createEvidenceUploadIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceUploadIntentRequest"
      responses:
        "201":
          description: Upload intent created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadIntent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/evidence-items/{evidenceItemId}/versions:
    parameters:
      - $ref: "#/components/parameters/EvidenceItemId"
    get:
      tags:
        - Evidence
      summary: List evidence versions
      operationId: listEvidenceVersions
      responses:
        "200":
          description: Evidence versions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvidenceVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/evidence-items/{evidenceItemId}/reviews:
    parameters:
      - $ref: "#/components/parameters/EvidenceItemId"
    post:
      tags:
        - Evidence
      summary: Approve, reject, or request changes for evidence
      operationId: createEvidenceReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceReviewRequest"
      responses:
        "201":
          description: Evidence review recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceReview"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/cmmc/assessments:
    get:
      tags:
        - CMMC
      summary: List CMMC readiness assessments
      operationId: listCmmcAssessments
      responses:
        "200":
          description: Assessments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CmmcAssessment"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - CMMC
      summary: Create a CMMC readiness assessment
      operationId: createCmmcAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CmmcAssessmentCreateRequest"
      responses:
        "201":
          description: Assessment created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmmcAssessment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/cmmc/assessments/{assessmentId}/controls:
    parameters:
      - $ref: "#/components/parameters/AssessmentId"
    get:
      tags:
        - CMMC
      summary: List CMMC control statuses
      operationId: listCmmcControlStatuses
      responses:
        "200":
          description: Control statuses.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CmmcControlStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/cmmc/assessments/{assessmentId}/controls/{controlId}:
    parameters:
      - $ref: "#/components/parameters/AssessmentId"
      - $ref: "#/components/parameters/ControlId"
    patch:
      tags:
        - CMMC
      summary: Update a CMMC control status
      operationId: updateCmmcControlStatus
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/CmmcControlStatusPatchRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/CmmcControlStatusPatchRequest"
      responses:
        "200":
          description: Updated control status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CmmcControlStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/cmmc/assessments/{assessmentId}/poam-items:
    parameters:
      - $ref: "#/components/parameters/AssessmentId"
    get:
      tags:
        - CMMC
      summary: List POA&M items
      operationId: listPoamItems
      responses:
        "200":
          description: POA&M items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PoamItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - CMMC
      summary: Create a POA&M item
      operationId: createPoamItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoamItemCreateRequest"
      responses:
        "201":
          description: POA&M item created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoamItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/cmmc/assessments/{assessmentId}/sprs-score:
    parameters:
      - $ref: "#/components/parameters/AssessmentId"
    get:
      tags:
        - CMMC
      summary: Calculate current SPRS-style score
      operationId: getSprsScore
