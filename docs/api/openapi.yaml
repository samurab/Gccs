openapi: 3.1.0
info:
  title: GCCS API
  version: 0.1.0
  summary: Government Contractor Compliance SaaS API
  description: >
    API specification for the GCCS MVP. GCCS is a No-CUI compliance management
    SaaS for small U.S. government contractors. The API is tenant-scoped and
    supports company profiles, contract intake, clause obligations, evidence,
    calendar tasks, CMMC readiness, subcontractor flow-downs, reports, and
    source-backed compliance content.
  contact:
    name: GCCS Product Team
servers:
  - url: http://localhost:5062
    description: Local ASP.NET Core API
  - url: https://api.gccs.example.com
    description: Production API placeholder
security:
  - bearerAuth: []
tags:
  - name: System
    description: Health and API metadata.
  - name: Access
    description: Current-user role and permission metadata for RBAC-driven UI states.
  - name: Compliance Overview
    description: Product overview and dashboard summary.
  - name: Tenants
    description: Tenant creation, status, and current-tenant workspace metadata.
  - name: Company Profile
    description: Tenant company registration, size, certification, and data posture.
  - name: Contracts
    description: Contract, solicitation, subcontract, and purchase order intake.
  - name: Clauses
    description: Contract clause capture and normalization.
  - name: Obligations
    description: Source-backed compliance obligations and contract obligation matrices.
  - name: Tasks
    description: Compliance calendar, reminders, and work assignment.
  - name: Evidence
    description: No-CUI acknowledgement, evidence vault metadata, upload intents, versions, and reviews.
  - name: CMMC
    description: CMMC and NIST readiness assessments, controls, and POA&M metadata. SPRS scoring is deferred from the MVP.
  - name: Subcontractors
    description: Subcontractor profiles, flow-down clauses, and evidence requests.
  - name: Reports
    description: Report generation and exports.
  - name: Audit Logs
    description: Tenant audit trail.
  - name: Source Library
    description: Reviewed compliance sources and obligation library governance.
paths:
  /health:
    get:
      tags:
        - System
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: API is reachable, but one or more local dependencies are unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/me/access:
    get:
      tags:
        - Access
      summary: Get current user roles and permissions
      operationId: getCurrentUserAccess
      description: >
        Returns role-derived permissions for the authenticated tenant context so
        clients can hide restricted actions. Server-side authorization remains
        authoritative.
      responses:
        "200":
          description: Current user access metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserAccess"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/compliance/overview:
    get:
      tags:
        - Compliance Overview
      summary: Get compliance workspace overview
      operationId: getComplianceOverview
      responses:
        "200":
          description: Dashboard overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/tenants:
    post:
      tags:
        - Tenants
      summary: Create a No-CUI tenant workspace
      operationId: createTenant
      description: >
        Creates an isolated customer tenant in the MVP No-CUI posture. Tenant
        creation requires the ManageTenant permission and creates an audit event
        in the new tenant scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Created tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/tenants/{tenantId}:
    get:
      tags:
        - Tenants
      summary: Get tenant metadata in the current tenant scope
      operationId: getTenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Tenant metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tenants/{tenantId}/status:
    patch:
      tags:
        - Tenants
      summary: Update tenant status
      operationId: updateTenantStatus
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantStatusRequest"
      responses:
        "200":
          description: Updated tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tenant-members:
    get:
      tags:
        - Tenants
      summary: List users assigned to the current tenant
      operationId: listCurrentTenantMembers
      description: >
        Returns only memberships for the authenticated active tenant. Requires
        the ManageUsers permission.
      responses:
        "200":
          description: Current-tenant members.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Tenants
      summary: Assign a user to the current tenant
      operationId: assignTenantMember
      description: >
        Adds an explicit membership between an existing or newly recorded user
        and the authenticated tenant. Duplicate user membership in the same
        tenant is rejected and successful changes are audit logged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTenantMemberRequest"
      responses:
        "201":
          description: Created current-tenant membership.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMember"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: User already has a membership in the current tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/tenant-members/{membershipId}/status:
    patch:
      tags:
        - Tenants
      summary: Update current-tenant membership status
      operationId: updateTenantMembershipStatus
      parameters:
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantMembershipStatusRequest"
      responses:
        "200":
          description: Updated current-tenant membership.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tenant-invitations:
    get:
      tags:
        - Tenants
      summary: List user invitations in the current tenant
      operationId: listCurrentTenantInvitations
      description: >
        Returns only invitations for the authenticated active tenant. Requires
        the ManageUsers permission.
      responses:
        "200":
          description: Current-tenant invitations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantInvitation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Tenants
      summary: Invite a user to the current tenant
      operationId: createTenantInvitation
      description: >
        Creates a pending invitation with a local notification placeholder. The
        invited role is assigned when the token is accepted. Requires the
        ManageUsers permission and writes an audit event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantInvitationRequest"
      responses:
        "201":
          description: Created current-tenant invitation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantInvitation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: A pending invitation already exists for this email in the current tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /api/invitations/{token}/accept:
    post:
      tags:
        - Tenants
      summary: Accept an invitation token
      operationId: acceptTenantInvitation
      description: >
        Accepts a pending invitation token, creates an active tenant membership
        with the invited role, and writes an audit event. Expired and revoked
        invitations cannot be accepted.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptTenantInvitationRequest"
      responses:
        "200":
          description: Accepted invitation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantInvitation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tenant-invitations/{invitationId}/expire:
    post:
      tags:
        - Tenants
      summary: Expire a current-tenant invitation
      operationId: expireTenantInvitation
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Expired invitation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantInvitation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tenant-invitations/{invitationId}/revoke:
    post:
      tags:
        - Tenants
      summary: Revoke a current-tenant invitation
      operationId: revokeTenantInvitation
      parameters:
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Revoked invitation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantInvitation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/company-profile:
    get:
      tags:
        - Company Profile
      summary: Get the tenant company profile
      operationId: getCompanyProfile
      responses:
        "200":
          description: Company profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Company Profile
      summary: Create or replace the tenant company profile
      operationId: upsertCompanyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyProfileUpsertRequest"
      responses:
        "200":
          description: Saved company profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/company-profile/sam-lookup:
    post:
      tags:
        - Company Profile
      summary: Queue a SAM.gov profile lookup
      operationId: createSamLookup
      description: >
        Creates a lookup job against an official entity data source. The MVP
        stores the request and result metadata; API keys and adapter behavior are
        implementation details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SamLookupRequest"
      responses:
        "202":
          description: Lookup accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/contracts:
    get:
      tags:
        - Contracts
      summary: List contracts
      operationId: listContracts
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ContractStatus"
        - name: agency
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/ContractorRole"
      responses:
        "200":
          description: Paged contracts.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ContractSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Contracts
      summary: Create a contract intake record
      operationId: createContract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractCreateRequest"
      responses:
        "201":
          description: Contract created.
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/contracts/{contractId}:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    get:
      tags:
        - Contracts
      summary: Get a contract
      operationId: getContract
      responses:
        "200":
          description: Contract detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Contracts
      summary: Update contract metadata
      operationId: updateContract
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/ContractPatchRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/ContractPatchRequest"
      responses:
        "200":
          description: Updated contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Contracts
      summary: Archive a contract
      operationId: archiveContract
      responses:
        "204":
          description: Contract archived.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/documents:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    get:
      tags:
        - Contracts
      summary: List contract intake documents
      operationId: listContractDocuments
      responses:
        "200":
          description: Contract documents.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Contracts
      summary: Create a No-CUI contract document upload intent
      operationId: createContractDocumentUploadIntent
      description: >
        Returns an upload intent for a contract file. Users must attest that the
        file does not contain CUI, classified information, export-controlled
        technical data, or other content excluded by the MVP No-CUI posture.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUploadIntentRequest"
      responses:
        "201":
          description: Upload intent created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceUploadIntent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "428":
          $ref: "#/components/responses/PreconditionRequired"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/documents/{documentId}/extraction-jobs:
    parameters:
      - $ref: "#/components/parameters/ContractId"
      - $ref: "#/components/parameters/DocumentId"
    post:
      tags:
        - Contracts
      summary: Queue contract document extraction
      operationId: createContractExtractionJob
      responses:
        "202":
          description: Extraction job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/clauses:
    get:
      tags:
        - Clauses
      summary: Search the published clause library
      operationId: searchClauseLibrary
      description: >
        Searches published global clauses and published custom clauses owned by
        the current tenant. Draft, retired, rejected, and other-tenant custom
        clauses are excluded from customer mapping results.
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Clause number, source, title, or summary text.
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [FAR, DFARS, CMMC, Labor, Telecom, ByteDance, Custom]
      responses:
        "200":
          description: Published clause search results.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClauseLibraryItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/contracts/{contractId}/clauses:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    get:
      tags:
        - Clauses
      summary: List clauses captured for a contract
      operationId: listContractClauses
      responses:
        "200":
          description: Clauses.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractClause"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Clauses
      summary: Attach a published library clause to a contract
      operationId: attachContractClause
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractClauseCreateRequest"
      responses:
        "201":
          description: Clause added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractClause"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/clauses/{contractClauseId}:
    parameters:
      - $ref: "#/components/parameters/ContractId"
      - name: contractClauseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags:
        - Clauses
      summary: Remove an attached clause from a contract
      operationId: removeContractClause
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractClauseRemoveRequest"
      responses:
        "200":
          description: Clause removed with reason.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractClause"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/clauses/{contractClauseId}/obligations/generate:
    parameters:
      - $ref: "#/components/parameters/ContractId"
      - name: contractClauseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - Clauses
        - Obligations
      summary: Generate contract obligations for an attached clause
      operationId: generateContractClauseObligations
      description: >
        Reprocesses an attached clause against published obligation templates.
        Generation is idempotent and will not create duplicate
        contract-clause-obligation mappings or duplicate default tasks.
      responses:
        "200":
          description: Generated obligation mapping summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedContractObligations"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/obligations:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    get:
      tags:
        - Obligations
      summary: List obligation matrix for a contract
      operationId: listContractObligations
      responses:
        "200":
          description: Contract obligation matrix.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractObligation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contracts/{contractId}/obligation-evaluations:
    parameters:
      - $ref: "#/components/parameters/ContractId"
    post:
      tags:
        - Obligations
      summary: Evaluate contract clauses against the obligation library
      operationId: evaluateContractObligations
      description: >
        Produces or refreshes draft contract-specific obligations. Results must
        retain source references and expert-review flags from the obligation
        library.
      responses:
        "202":
          description: Evaluation job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/contract-obligations:
    get:
      tags:
        - Obligations
      summary: List tenant-scoped contract obligations for the dashboard
      operationId: listContractObligationDashboard
      parameters:
        - name: contractId
          in: query
          schema:
            type: string
            format: uuid
        - name: riskLevel
          in: query
          schema:
            $ref: "#/components/schemas/RiskLevel"
        - name: owner
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ComplianceTaskStatus"
        - name: module
          in: query
          schema:
            type: string
            enum:
              - Cybersecurity
              - Labor
              - Supply chain
              - Contract
        - name: dueDate
          in: query
          schema:
            type: string
            description: Use overdue, next30, none, or an exact ISO date.
        - name: source
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tenant-scoped obligation dashboard rows.
          content:
            application/json:
