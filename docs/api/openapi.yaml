          description: Current user's No-CUI acknowledgement status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoCuiAcknowledgementStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Evidence
      summary: Acknowledge the current No-CUI notice
      operationId: acknowledgeNoCuiNotice
      description: >
        Stores the authenticated user's acknowledgement for the active tenant,
        records the notice version and timestamp, and writes an audit event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeNoCuiRequest"
      responses:
        "200":
          description: Acknowledgement status after save.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoCuiAcknowledgementStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/reports/{reportId}:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    get:
      tags:
        - Reports
      summary: Get report metadata
      operationId: getReport
      responses:
        "200":
          description: Report metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/reports/{reportId}/download:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    get:
      tags:
        - Reports
      summary: Download a generated report
      operationId: downloadReport
      responses:
        "302":
          description: Redirects to a time-limited report download URL.
          headers:
            Location:
              schema:
                type: string
                format: uri
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/audit-logs:
    get:
      tags:
        - Audit Logs
      summary: List tenant audit log entries
      operationId: listAuditLogs
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: actorUserId
          in: query
          schema:
            type: string
            format: uuid
        - name: entityType
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paged audit entries.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuditLogEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/audit-logs/{auditLogEntryId}:
    parameters:
      - $ref: "#/components/parameters/AuditLogEntryId"
    put:
      tags:
        - Audit Logs
      summary: Reject audit log mutation
      operationId: rejectAuditLogPut
      responses:
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
    patch:
      tags:
        - Audit Logs
      summary: Reject audit log mutation
      operationId: rejectAuditLogPatch
      responses:
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
    delete:
      tags:
        - Audit Logs
      summary: Reject audit log deletion
      operationId: rejectAuditLogDelete
      responses:
        "405":
          $ref: "#/components/responses/MethodNotAllowed"

  /api/source-library/references:
    get:
      tags:
        - Source Library
      summary: List reviewed compliance source references
      operationId: listSourceReferences
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: sourceType
          in: query
          schema:
            $ref: "#/components/schemas/SourceType"
      responses:
        "200":
          description: Paged source references.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/SourceReference"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Tenant-scoped user access token. MVP implementation may use local development auth before SSO/MFA is enabled.

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    ContractId:
      name: contractId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ObligationId:
      name: obligationId
      in: path
      required: true
      schema:
        type: string
      example: far-52-204-21
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceItemId:
      name: evidenceItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuditLogEntryId:
      name: auditLogEntryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssessmentId:
      name: assessmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ControlId:
      name: controlId
      in: path
      required: true
      schema:
        type: string
      example: AC.L2-3.1.1
    SubcontractorId:
      name: subcontractorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: User is authenticated but not authorized for the requested tenant action.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Resource was not found in the current tenant scope.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    PreconditionRequired:
      description: A required No-CUI acknowledgement or similar tenant precondition is missing.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    MethodNotAllowed:
      description: The requested method is not allowed for append-only resources.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    ProblemDetails:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        traceId:
          type: string
        correlationId:
          type: string
        errorCode:
          type: string

    PagedResult:
      type: object
      required:
        - items
        - page
        - pageSize
        - totalCount
        - hasNextPage
        - hasPreviousPage
      properties:
        items:
          type: array
          items: {}
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        totalCount:
          type: integer
          minimum: 0
        hasNextPage:
          type: boolean
        hasPreviousPage:
          type: boolean

    HealthResponse:
      type: object
      required:
        - status
        - service
        - dataPosture
        - checkedAt
        - dependencies
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        service:
          type: string
          example: gccs-api
        dataPosture:
          type: string
          example: No-CUI / compliance management only
        checkedAt:
          type: string
          format: date-time
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/DependencyHealth"

    DependencyHealth:
      type: object
      required:
        - name
        - status
        - detail
      properties:
        name:
          type: string
          example: postgresql
        status:
          type: string
          enum:
            - ok
            - unhealthy
        detail:
          type: string

    RoleName:
      type: string
      enum:
        - Owner
        - Admin
        - Compliance Manager
        - Contributor
        - Auditor
        - Advisor

    PermissionName:
      type: string
      enum:
        - ManageTenant
        - ManageUsers
        - ViewCompanyProfile
        - ManageCompanyProfile
        - ViewContracts
        - ManageContracts
        - ViewObligations
        - ManageObligations
        - ViewTasks
        - ManageTasks
        - ViewEvidence
        - ManageEvidence
        - ApproveEvidence
        - ViewCmmc
        - ManageCmmc
        - ViewSubcontractors
        - ManageSubcontractors
        - ViewReports
        - ManageReports
        - ViewAuditLog
        - AuditorReadOnly

    CurrentUserAccess:
      type: object
      required:
        - tenantId
        - userId
        - userEmail
        - roles
        - permissions
        - rolePermissionMatrix
      properties:
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        userEmail:
          type: string
          format: email
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleName"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionName"
        rolePermissionMatrix:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/PermissionName"

    Tenant:
      type: object
      required:
        - id
        - displayName
        - status
        - dataPosture
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          maxLength: 240
        status:
          $ref: "#/components/schemas/TenantStatus"
        dataPosture:
          $ref: "#/components/schemas/TenantDataPosture"
        trialEndsAt:
          type:
            - string
            - "null"
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type:
            - string
            - "null"
          format: date-time

    TenantMember:
      type: object
      required:
        - membershipId
        - tenantId
        - userId
        - email
        - displayName
        - userStatus
        - membershipStatus
        - roleName
        - mfaEnabled
        - createdAt
      properties:
        membershipId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
          maxLength: 320
        displayName:
          type: string
          maxLength: 200
        userStatus:
          $ref: "#/components/schemas/UserStatus"
        membershipStatus:
          $ref: "#/components/schemas/MembershipStatus"
        roleName:
          $ref: "#/components/schemas/RoleName"
        mfaEnabled:
          type: boolean
        lastSignedInAt:
          type:
            - string
            - "null"
          format: date-time
        lastAccessedAt:
          type:
            - string
            - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type:
            - string
            - "null"
          format: date-time

    AssignTenantMemberRequest:
      type: object
      required:
        - userId
        - email
        - displayName
        - roleName
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
          maxLength: 320
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        roleName:
          $ref: "#/components/schemas/RoleName"
        status:
          $ref: "#/components/schemas/MembershipStatus"

    UpdateTenantMembershipStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/MembershipStatus"

    TenantInvitation:
      type: object
      required:
        - invitationId
        - tenantId
        - email
        - roleName
        - invitationToken
        - status
        - expiresAt
        - notificationPlaceholder
        - createdAt
      properties:
        invitationId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        email:
          type: string
          format: email
          maxLength: 320
        roleName:
          $ref: "#/components/schemas/RoleName"
        invitationToken:
          type: string
          minLength: 1
          maxLength: 128
        status:
          $ref: "#/components/schemas/TenantInvitationStatus"
        expiresAt:
          type: string
          format: date-time
        acceptedAt:
          type:
            - string
            - "null"
          format: date-time
        acceptedByUserId:
          type:
            - string
            - "null"
          format: uuid
        revokedAt:
          type:
            - string
            - "null"
          format: date-time
        revokedByUserId:
          type:
            - string
            - "null"
          format: uuid
        notificationSentAt:
          type:
            - string
            - "null"
          format: date-time
        notificationPlaceholder:
          type: string
          maxLength: 600
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type:
            - string
            - "null"
          format: date-time

    CreateTenantInvitationRequest:
      type: object
      required:
        - email
        - roleName
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        roleName:
          $ref: "#/components/schemas/RoleName"
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 30
          default: 7

    AcceptTenantInvitationRequest:
      type: object
      required:
        - displayName
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 200

    CreateTenantRequest:
      type: object
      required:
        - displayName
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 240
        status:
          $ref: "#/components/schemas/TenantStatus"
        trialEndsAt:
          type:
            - string
            - "null"
          format: date

    UpdateTenantStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/TenantStatus"

    TenantStatus:
      type: string
      enum:
        - Active
        - Trialing
        - Suspended
        - Archived

    TenantDataPosture:
      type: string
      enum:
        - NoCui

    UserStatus:
      type: string
      enum:
        - Invited
        - Active
        - Disabled

    MembershipStatus:
      type: string
      enum:
        - Active
        - Suspended
        - Deactivated

    TenantInvitationStatus:
      type: string
      enum:
        - Pending
        - Accepted
        - Expired
        - Revoked

    ComplianceOverview:
      type: object
      required:
        - productPromise
        - mvpDataPosture
        - modules
        - priorityObligations
      properties:
        productPromise:
          type: string
        mvpDataPosture:
          type: string
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleStatus"
        priorityObligations:
          type: array
          items:
            $ref: "#/components/schemas/ObligationSummary"

    ModuleStatus:
      type: object
      required:
        - key
        - name
        - purpose
        - status
      properties:
        key:
          type: string
        name:
          type: string
        purpose:
          type: string
        status:
          type: string

    ObligationSummary:
      type: object
      required:
        - id
        - source
        - title
        - ownerFunction
        - riskLevel
        - sourceUrl
        - lastReviewedAt
      properties:
        id:
          type: string
        source:
          type: string
        title:
          type: string
        ownerFunction:
          type: string
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        sourceUrl:
          type: string
          format: uri
        lastReviewedAt:
          type: string
          format: date

    CompanyProfile:
      allOf:
        - $ref: "#/components/schemas/CompanyProfileUpsertRequest"
        - type: object
          required:
            - id
            - tenantId
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
            tenantId:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    CompanyProfileUpsertRequest:
      type: object
      required:
        - legalEntityName
        - handlesFci
        - handlesCui
      properties:
        legalEntityName:
          type: string
        uei:
          type:
            - string
            - "null"
        cageCode:
          type:
            - string
            - "null"
        samExpirationDate:
          type:
            - string
            - "null"
          format: date
        naicsCodes:
          type: array
          items:
            $ref: "#/components/schemas/NaicsCodeProfile"
        socioeconomicCertifications:
          type: array
          items:
            $ref: "#/components/schemas/Certification"
        agencyCustomers:
          type: array
          items:
            type: string
        contractorRoles:
          type: array
          items:
            $ref: "#/components/schemas/ContractorRole"
        productsAndServices:
          type: array
          items:
            type: string
        employeeRange:
          type:
            - string
            - "null"
        revenueRange:
          type:
            - string
            - "null"
        locations:
          type: array
          items:
            $ref: "#/components/schemas/Location"
        itEnvironmentSummary:
          type:
            - string
            - "null"
        handlesFci:
          $ref: "#/components/schemas/TriState"
        handlesCui:
          $ref: "#/components/schemas/TriState"
        noCuiAcknowledgedAt:
          type:
            - string
            - "null"
          format: date-time

    NaicsCodeProfile:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          pattern: "^[0-9]{2,6}$"
        description:
          type:
            - string
            - "null"
        sizeStandard:
          type:
            - string
            - "null"
        smallBusinessStatus:
          $ref: "#/components/schemas/TriState"
        lastCheckedAt:
          type:
            - string
            - "null"
          format: date-time

    Certification:
      type: object
      required:
        - type
        - status
      properties:
        type:
          $ref: "#/components/schemas/CertificationType"
        status:
          type: string
          enum:
            - active
            - pending
            - expired
            - not-applicable
            - unknown
        expiresAt:
          type:
            - string
            - "null"
          format: date
        source:
          type:
            - string
            - "null"

    Location:
      type: object
      properties:
        label:
          type: string
        street:
          type:
            - string
            - "null"
        city:
          type:
            - string
            - "null"
        state:
          type:
            - string
            - "null"
        postalCode:
          type:
            - string
            - "null"
        country:
          type: string
          default: US

    SamLookupRequest:
      type: object
      properties:
        uei:
          type:
            - string
            - "null"
        cageCode:
          type:
            - string
            - "null"
        legalEntityName:
          type:
            - string
            - "null"

    ContractSummary:
      type: object
      required:
        - id
        - title
        - status
        - role
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        contractNumber:
          type:
            - string
            - "null"
        agencyOrPrime:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/ContractStatus"
        role:
          $ref: "#/components/schemas/ContractorRole"
        periodOfPerformanceStart:
          type:
            - string
            - "null"
          format: date
        periodOfPerformanceEnd:
          type:
            - string
            - "null"
          format: date
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        updatedAt:
          type: string
          format: date-time

    Contract:
      allOf:
        - $ref: "#/components/schemas/ContractCreateRequest"
        - type: object
          required:
            - id
            - tenantId
            - status
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
            tenantId:
              type: string
              format: uuid
            status:
              $ref: "#/components/schemas/ContractStatus"
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ContractCreateRequest:
      type: object
      required:
        - title
        - role
      properties:
        title:
          type: string
        contractNumber:
          type:
            - string
            - "null"
        agencyOrPrime:
          type:
            - string
            - "null"
        role:
          $ref: "#/components/schemas/ContractorRole"
        contractType:
          type:
            - string
            - "null"
          examples:
            - federal contract
            - subcontract
            - purchase order
        setAsideStatus:
          type:
            - string
            - "null"
        periodOfPerformanceStart:
          type:
            - string
            - "null"
          format: date
        periodOfPerformanceEnd:
          type:
            - string
            - "null"
          format: date
        placeOfPerformance:
          type:
            - string
            - "null"
        dataTypes:
          type: array
          items:
            $ref: "#/components/schemas/DataType"
        notes:
          type:
            - string
            - "null"

    ContractPatchRequest:
      type: object
      properties:
        title:
          type: string
        contractNumber:
          type:
            - string
            - "null"
        agencyOrPrime:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/ContractStatus"
        role:
          $ref: "#/components/schemas/ContractorRole"
        contractType:
          type:
            - string
            - "null"
        setAsideStatus:
          type:
            - string
            - "null"
        periodOfPerformanceStart:
          type:
            - string
            - "null"
          format: date
        periodOfPerformanceEnd:
          type:
            - string
            - "null"
          format: date
        placeOfPerformance:
          type:
            - string
            - "null"
        dataTypes:
          type: array
          items:
            $ref: "#/components/schemas/DataType"
        notes:
          type:
            - string
            - "null"

    ContractDocument:
      type: object
      required:
        - id
        - contractId
        - documentType
        - fileName
        - status
        - noCuiAttestation
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        contractId:
          type: string
          format: uuid
        documentType:
          $ref: "#/components/schemas/ContractDocumentType"
        fileName:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        status:
          $ref: "#/components/schemas/DocumentStatus"
        noCuiAttestation:
          $ref: "#/components/schemas/NoCuiAttestation"
        createdAt:
          type: string
          format: date-time

    DocumentUploadIntentRequest:
      type: object
      required:
        - documentType
        - fileName
        - contentType
        - sizeBytes
        - noCuiAttestation
      properties:
        documentType:
