      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlowDownClauseCreateRequest"
      responses:
        "201":
          description: Flow-down clause added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowDownClause"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/subcontractors/{subcontractorId}/evidence-requests:
    parameters:
      - $ref: "#/components/parameters/SubcontractorId"
    post:
      tags:
        - Subcontractors
      summary: Create a subcontractor evidence request
      operationId: createSubcontractorEvidenceRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubcontractorEvidenceRequestCreateRequest"
      responses:
        "201":
          description: Evidence request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubcontractorEvidenceRequest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/reports:
    get:
      tags:
        - Reports
      summary: List generated reports
      operationId: listReports
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/ReportType"
      responses:
        "200":
          description: Paged reports.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Reports
      summary: Generate a report
      operationId: createReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportCreateRequest"
      responses:
        "202":
          description: Report generation accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/reports/{reportId}:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    get:
      tags:
        - Reports
      summary: Get report metadata
      operationId: getReport
      responses:
        "200":
          description: Report metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/reports/{reportId}/download:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    get:
      tags:
        - Reports
      summary: Download a generated report
      operationId: downloadReport
