      operationId: listSourceReferences
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: sourceType
          in: query
          schema:
            $ref: "#/components/schemas/SourceType"
      responses:
        "200":
          description: Paged source references.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/SourceReference"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Tenant-scoped user access token. MVP implementation may use local development auth before SSO/MFA is enabled.

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    ContractId:
      name: contractId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ObligationId:
      name: obligationId
      in: path
      required: true
      schema:
        type: string
      example: far-52-204-21
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceItemId:
      name: evidenceItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssessmentId:
      name: assessmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ControlId:
      name: controlId
      in: path
      required: true
      schema:
        type: string
      example: AC.L2-3.1.1
    SubcontractorId:
      name: subcontractorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: User is authenticated but not authorized for the requested tenant action.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Resource was not found in the current tenant scope.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    ProblemDetails:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        traceId:
          type: string

    PagedResult:
      type: object
      required:
        - items
        - page
        - pageSize
        - totalItems
        - totalPages
      properties:
        items:
          type: array
          items: {}
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    HealthResponse:
      type: object
      required:
        - status
        - service
        - dataPosture
        - checkedAt
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: gccs-api
        dataPosture:
          type: string
          example: No-CUI / compliance management only
        checkedAt:
          type: string
          format: date-time

    ComplianceOverview:
      type: object
      required:
        - productPromise
        - mvpDataPosture
        - modules
        - priorityObligations
      properties:
        productPromise:
          type: string
        mvpDataPosture:
          type: string
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleStatus"
        priorityObligations:
          type: array
          items:
            $ref: "#/components/schemas/ObligationSummary"

    ModuleStatus:
      type: object
      required:
        - key
        - name
        - purpose
        - status
      properties:
        key:
          type: string
        name:
          type: string
        purpose:
          type: string
        status:
          type: string

    ObligationSummary:
      type: object
      required:
        - id
        - source
        - title
        - ownerFunction
        - riskLevel
        - sourceUrl
        - lastReviewedAt
      properties:
        id:
          type: string
        source:
          type: string
        title:
          type: string
        ownerFunction:
          type: string
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        sourceUrl:
          type: string
          format: uri
        lastReviewedAt:
          type: string
          format: date

    CompanyProfile:
      allOf:
        - $ref: "#/components/schemas/CompanyProfileUpsertRequest"
        - type: object
          required:
            - id
            - tenantId
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
            tenantId:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    CompanyProfileUpsertRequest:
      type: object
      required:
        - legalEntityName
        - handlesFci
        - handlesCui
      properties:
        legalEntityName:
          type: string
        uei:
          type:
            - string
            - "null"
        cageCode:
          type:
            - string
            - "null"
        samExpirationDate:
          type:
            - string
            - "null"
          format: date
        naicsCodes:
          type: array
          items:
            $ref: "#/components/schemas/NaicsCodeProfile"
        socioeconomicCertifications:
          type: array
          items:
            $ref: "#/components/schemas/Certification"
        agencyCustomers:
          type: array
          items:
            type: string
        contractorRoles:
          type: array
          items:
            $ref: "#/components/schemas/ContractorRole"
        productsAndServices:
          type: array
          items:
            type: string
        employeeRange:
          type:
            - string
            - "null"
        revenueRange:
          type:
            - string
            - "null"
        locations:
          type: array
          items:
            $ref: "#/components/schemas/Location"
        itEnvironmentSummary:
          type:
            - string
            - "null"
        handlesFci:
          $ref: "#/components/schemas/TriState"
        handlesCui:
          $ref: "#/components/schemas/TriState"
        noCuiAcknowledgedAt:
          type:
            - string
            - "null"
          format: date-time

    NaicsCodeProfile:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          pattern: "^[0-9]{2,6}$"
        description:
          type:
            - string
            - "null"
        sizeStandard:
          type:
            - string
            - "null"
        smallBusinessStatus:
          $ref: "#/components/schemas/TriState"
        lastCheckedAt:
          type:
            - string
            - "null"
          format: date-time

    Certification:
      type: object
      required:
        - type
        - status
      properties:
        type:
          $ref: "#/components/schemas/CertificationType"
        status:
          type: string
          enum:
            - active
            - pending
            - expired
            - not-applicable
            - unknown
        expiresAt:
          type:
            - string
            - "null"
          format: date
        source:
          type:
            - string
            - "null"

    Location:
      type: object
      properties:
        label:
          type: string
        street:
          type:
            - string
            - "null"
        city:
          type:
            - string
            - "null"
        state:
          type:
            - string
            - "null"
        postalCode:
          type:
            - string
            - "null"
        country:
          type: string
          default: US

    SamLookupRequest:
      type: object
      properties:
        uei:
          type:
            - string
            - "null"
        cageCode:
          type:
            - string
            - "null"
        legalEntityName:
          type:
            - string
            - "null"

    ContractSummary:
      type: object
      required:
        - id
        - title
        - status
        - role
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        contractNumber:
          type:
            - string
            - "null"
        agencyOrPrime:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/ContractStatus"
        role:
          $ref: "#/components/schemas/ContractorRole"
        periodOfPerformanceStart:
          type:
            - string
            - "null"
          format: date
        periodOfPerformanceEnd:
          type:
            - string
            - "null"
          format: date
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        updatedAt:
          type: string
          format: date-time

    Contract:
      allOf:
        - $ref: "#/components/schemas/ContractCreateRequest"
        - type: object
          required:
            - id
            - tenantId
            - status
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
            tenantId:
              type: string
              format: uuid
            status:
              $ref: "#/components/schemas/ContractStatus"
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ContractCreateRequest:
      type: object
      required:
        - title
        - role
      properties:
        title:
          type: string
        contractNumber:
          type:
            - string
            - "null"
        agencyOrPrime:
          type:
            - string
            - "null"
        role:
          $ref: "#/components/schemas/ContractorRole"
        contractType:
          type:
            - string
            - "null"
          examples:
            - federal contract
            - subcontract
            - purchase order
        setAsideStatus:
          type:
            - string
            - "null"
        periodOfPerformanceStart:
          type:
            - string
            - "null"
          format: date
        periodOfPerformanceEnd:
          type:
            - string
            - "null"
          format: date
        placeOfPerformance:
          type:
            - string
            - "null"
        dataTypes:
          type: array
          items:
            $ref: "#/components/schemas/DataType"
        notes:
          type:
            - string
            - "null"

    ContractPatchRequest:
      type: object
      properties:
        title:
          type: string
        contractNumber:
          type:
            - string
            - "null"
        agencyOrPrime:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/ContractStatus"
        role:
          $ref: "#/components/schemas/ContractorRole"
        contractType:
          type:
            - string
            - "null"
        setAsideStatus:
          type:
            - string
            - "null"
        periodOfPerformanceStart:
          type:
            - string
            - "null"
          format: date
        periodOfPerformanceEnd:
          type:
            - string
            - "null"
          format: date
        placeOfPerformance:
          type:
            - string
            - "null"
        dataTypes:
          type: array
          items:
            $ref: "#/components/schemas/DataType"
        notes:
          type:
            - string
            - "null"

    ContractDocument:
      type: object
      required:
        - id
        - contractId
        - documentType
        - fileName
        - status
        - noCuiAttestation
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        contractId:
          type: string
          format: uuid
        documentType:
          $ref: "#/components/schemas/ContractDocumentType"
        fileName:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        status:
          $ref: "#/components/schemas/DocumentStatus"
        noCuiAttestation:
          $ref: "#/components/schemas/NoCuiAttestation"
        createdAt:
          type: string
          format: date-time

    DocumentUploadIntentRequest:
      type: object
      required:
        - documentType
        - fileName
        - contentType
        - sizeBytes
        - noCuiAttestation
      properties:
        documentType:
          $ref: "#/components/schemas/ContractDocumentType"
        fileName:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
          minimum: 1
        noCuiAttestation:
          $ref: "#/components/schemas/NoCuiAttestation"

    ContractClause:
      allOf:
        - $ref: "#/components/schemas/ContractClauseCreateRequest"
        - type: object
          required:
            - id
            - contractId
            - createdAt
          properties:
            id:
              type: string
              format: uuid
            contractId:
              type: string
              format: uuid
            createdAt:
              type: string
              format: date-time

    ContractClauseCreateRequest:
      type: object
      required:
        - source
        - title
      properties:
        source:
          type: string
          examples:
            - FAR 52.204-21
        title:
          type: string
        fullText:
          type:
            - string
            - "null"
        effectiveDate:
          type:
            - string
            - "null"
          format: date
        sourceDocumentId:
          type:
            - string
            - "null"
          format: uuid
        extractionConfidence:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 1
        userVerified:
          type: boolean
          default: false

    ContractObligation:
      type: object
      required:
        - id
        - contractId
        - obligationId
        - source
        - title
        - ownerFunction
        - riskLevel
        - status
        - evidenceStatus
        - sourceReference
      properties:
        id:
          type: string
          format: uuid
        contractId:
          type: string
          format: uuid
        obligationId:
          type: string
        source:
          type: string
        title:
          type: string
        plainEnglishSummary:
          type: string
        requiredAction:
          type: string
        ownerFunction:
          type: string
        dueDate:
          type:
            - string
            - "null"
          format: date
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        status:
          $ref: "#/components/schemas/ObligationStatus"
        evidenceStatus:
          $ref: "#/components/schemas/EvidenceCoverageStatus"
        flowDownRequired:
          type: boolean
        requiresExpertReview:
          type: boolean
        sourceReference:
          $ref: "#/components/schemas/SourceReference"

    Obligation:
      type: object
      required:
        - id
        - source
        - title
        - plainEnglishSummary
        - triggerCondition
        - requiredActions
        - ownerFunction
        - riskLevel
        - flowDownRequirement
        - applicability
        - evidenceExamples
        - sourceReference
        - confidence
        - requiresExpertReview
      properties:
        id:
          type: string
        source:
          type: string
        title:
          type: string
        plainEnglishSummary:
          type: string
        triggerCondition:
          type: string
        requiredActions:
          type: array
          items:
            type: string
        ownerFunction:
          type: string
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        flowDownRequirement:
          type: string
        applicability:
          $ref: "#/components/schemas/Applicability"
        evidenceExamples:
          type: array
          items:
            type: string
        reportingDeadline:
          type:
            - string
            - "null"
        sourceReference:
          $ref: "#/components/schemas/SourceReference"
        confidence:
          $ref: "#/components/schemas/Confidence"
        requiresExpertReview:
          type: boolean

    Applicability:
      type: object
      properties:
        appliesTo:
          type: array
          items:
            $ref: "#/components/schemas/ContractorRole"
        contractTypes:
          type: array
          items:
            type: string
        dataTypes:
          type: array
          items:
            $ref: "#/components/schemas/DataType"
        agencies:
          type: array
          items:
            type: string
        naicsCodes:
          type: array
          items:
            type: string
        placeOfPerformance:
          type: array
          items:
            type: string

    ComplianceTask:
      allOf:
        - $ref: "#/components/schemas/ComplianceTaskCreateRequest"
        - type: object
          required:
            - id
            - status
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
              format: uuid
            status:
              $ref: "#/components/schemas/TaskStatus"
            completedAt:
              type:
                - string
                - "null"
              format: date-time
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ComplianceTaskCreateRequest:
      type: object
      required:
        - title
        - category
      properties:
        title:
          type: string
        description:
          type:
            - string
            - "null"
        category:
