        - $ref: "#/components/parameters/PageSize"
        - name: actorUserId
          in: query
          schema:
            type: string
            format: uuid
        - name: entityType
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paged audit entries.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PagedResult"
                  - type: object
                    properties:
                      items:
