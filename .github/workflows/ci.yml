name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore Gccs.slnx
      - run: dotnet build Gccs.slnx --no-restore --configuration Release
      - run: dotnet test Gccs.slnx --no-build --configuration Release

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "25"
          cache: npm
      - run: npm install
      - run: npm run build:web
