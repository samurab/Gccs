name: Staging deployment

on:
  workflow_dispatch:
  push:
    branches: ["main", "release/**"]

permissions:
  contents: read

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  staging-deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_WEB_BASE_URL }}
    env:
      DOTNET_ENVIRONMENT: Staging
      ASPNETCORE_ENVIRONMENT: Staging
      Gccs__DataPosture: No-CUI / compliance management only
      STAGING_API_APP_NAME: gccs-api-staging-19984
      STAGING_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}
      STAGING_WEB_BASE_URL: ${{ vars.STAGING_WEB_BASE_URL }}
      STAGING_CUSTOMER_DATA_MODE: synthetic-only
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "25"
          cache: npm

      - name: Restore dependencies
        run: |
          dotnet restore Gccs.slnx
          npm ci

      - name: Build staging artifacts
        run: |
          dotnet publish apps/api/Gccs.Api.csproj --configuration Release --output "$RUNNER_TEMP/gccs-api-staging"
          npm run build:web

      - name: Generate idempotent migration script
        run: |
          dotnet tool restore
          dotnet tool run dotnet-ef migrations script --idempotent \
            --project src/Gccs.Infrastructure/Gccs.Infrastructure.csproj \
            --startup-project apps/api/Gccs.Api.csproj \
            --context GccsDbContext \
            --output "$RUNNER_TEMP/gccs-staging-migrations.sql"

      - name: Validate staging No-CUI and no production data guardrails
        run: |
          test "$STAGING_CUSTOMER_DATA_MODE" = "synthetic-only"
          grep -R "No-CUI" docs/staging-environment.md
          grep -R "no production customer data" docs/staging-environment.md

      - name: Validate staging infrastructure contract
        run: |
          test -f infra/terraform/environments/staging/main.tf
          grep -R "api" infra/terraform/environments/staging/main.tf
          grep -R "web" infra/terraform/environments/staging/main.tf
          grep -R "database" infra/terraform/environments/staging/main.tf
          grep -R "object_storage" infra/terraform/environments/staging/main.tf
          grep -R "cache" infra/terraform/environments/staging/main.tf
          grep -R "queue" infra/terraform/environments/staging/main.tf
          grep -R "secrets" infra/terraform/environments/staging/main.tf

      - name: Deploy staging API, web, data, storage, cache, queue, and secrets
        run: |
          echo "Staging database, object storage, cache, queue, and secrets are provisioned outside this repository workflow."
          echo "API and web artifacts are deployed by the following workflow steps."

      - name: Login to Azure staging subscription
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_GCCS_STAGING }}

      - name: Deploy staging API App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.STAGING_API_APP_NAME }}
          package: ${{ runner.temp }}/gccs-api-staging

      - name: Deploy staging Static Web App
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ env.STAGING_API_BASE_URL }}
          VITE_MSAL_CLIENT_ID: 8df0cbe5-60ee-4356-9386-41f300e82718
          VITE_MSAL_TENANT_ID: 8c934636-0c37-4a8f-9134-323bef993ef2
          VITE_MSAL_API_SCOPE: api://ad0a64ee-ab9a-4dcf-b330-b3ab36214426/access_as_user
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_ROCK_016FF040F }}
          action: upload
          app_location: apps/web
          api_location: ""
          output_location: dist
          skip_app_build: true

      - name: Record staging deployment inputs
        run: |
          echo "Deploy API artifact from $RUNNER_TEMP/gccs-api-staging"
          echo "Deploy web artifact from apps/web/dist"
          echo "Apply staging migrations from $RUNNER_TEMP/gccs-staging-migrations.sql"
          echo "Provisioned staging database, object storage, cache, queue, and secrets through Azure resource group gccs-staging-rg."

      - name: Run staging smoke tests
        run: |
          test -n "$STAGING_API_BASE_URL"
          curl --fail --show-error --silent "$STAGING_API_BASE_URL/health" | tee "$RUNNER_TEMP/staging-health.json"
          grep '"service":"gccs-api"' "$RUNNER_TEMP/staging-health.json"
          grep '"dataPosture":"No-CUI / compliance management only"' "$RUNNER_TEMP/staging-health.json"
          grep '"name":"postgresql"' "$RUNNER_TEMP/staging-health.json"
          grep '"name":"redis"' "$RUNNER_TEMP/staging-health.json"
          grep '"name":"object-storage"' "$RUNNER_TEMP/staging-health.json"
          grep '"name":"background-jobs"' "$RUNNER_TEMP/staging-health.json"

      - name: Upload staging smoke test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: staging-smoke-test-results
          path: ${{ runner.temp }}/staging-health.json
