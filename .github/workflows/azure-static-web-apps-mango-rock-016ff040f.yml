name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "25"
          cache: npm

      - name: Build web artifact
        env:
          VITE_API_BASE_URL: https://gccs-api-staging-19984.azurewebsites.net
          VITE_MSAL_CLIENT_ID: 8df0cbe5-60ee-4356-9386-41f300e82718
          VITE_MSAL_TENANT_ID: 8c934636-0c37-4a8f-9134-323bef993ef2
          VITE_MSAL_API_SCOPE: api://ad0a64ee-ab9a-4dcf-b330-b3ab36214426/access_as_user
        run: |
          npm ci
          npm run build:web

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: https://gccs-api-staging-19984.azurewebsites.net
          VITE_MSAL_CLIENT_ID: 8df0cbe5-60ee-4356-9386-41f300e82718
          VITE_MSAL_TENANT_ID: 8c934636-0c37-4a8f-9134-323bef993ef2
          VITE_MSAL_API_SCOPE: api://ad0a64ee-ab9a-4dcf-b330-b3ab36214426/access_as_user
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_ROCK_016FF040F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/dist
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_ROCK_016FF040F }}
          action: close
