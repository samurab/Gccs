services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: gccs
      POSTGRES_USER: gccs
      POSTGRES_PASSWORD: gccs_dev_password
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gccs -d gccs"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gccs
      MINIO_ROOT_PASSWORD: gccs_dev_password
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 gccs gccs_dev_password &&
      mc mb --ignore-existing local/gccs-evidence-dev &&
      tail -f /dev/null
      "
    healthcheck:
      test: ["CMD-SHELL", "mc ls local/gccs-evidence-dev >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav-debian:stable
    ports:
      - "13310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20

volumes:
  postgres_data:
  minio_data:
