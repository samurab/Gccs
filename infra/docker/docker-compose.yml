services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: gccs
      POSTGRES_USER: gccs
      POSTGRES_PASSWORD: gccs_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gccs
      MINIO_ROOT_PASSWORD: gccs_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"

volumes:
  postgres_data:
  minio_data:
